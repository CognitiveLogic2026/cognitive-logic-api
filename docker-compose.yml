version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cognitive-logic-db
    environment:
      POSTGRES_USER: cognitive_user
      POSTGRES_PASSWORD: cognitive_secure_pass_2026
      POSTGRES_DB: cognitive_logic
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cognitive-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cognitive_user"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  cognitive-network:
    driver: bridge
